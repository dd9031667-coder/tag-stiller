name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: python -m pip install -e ".[dev]"
      - name: Run tests
        run: python -m pytest -m "not live" --cov=app --cov-report=term-missing

