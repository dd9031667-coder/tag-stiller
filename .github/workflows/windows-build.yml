name: Build and Release Windows

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: windows-release
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install bundled Chromium
        run: python -m playwright install chromium
      - name: Run tests
        run: python -m pytest -m "not live"
      - name: Build application
        run: python -m PyInstaller --noconfirm --clean TagStiller.spec
      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TagStiller/TagStiller.exe")) {
            throw "TagStiller.exe was not created"
          }
          $browser = Get-ChildItem "dist/TagStiller" -Recurse -Directory |
            Where-Object { $_.Name -like "chromium-*" } |
            Select-Object -First 1
          if (-not $browser) { throw "Bundled Chromium was not found" }
      - name: Create ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/TagStiller/*" -DestinationPath "TagStiller-Windows-x64.zip"
          $hash = (Get-FileHash "TagStiller-Windows-x64.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  TagStiller-Windows-x64.zip" |
            Set-Content "TagStiller-Windows-x64.zip.sha256" -Encoding ascii
      - uses: actions/upload-artifact@v4
        with:
          name: TagStiller-Windows-x64
          path: |
            TagStiller-Windows-x64.zip
            TagStiller-Windows-x64.zip.sha256
          if-no-files-found: error
      - name: Read application version
        id: version
        shell: pwsh
        run: |
          $version = python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])"
          "version=$version" >> $env:GITHUB_OUTPUT
      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "v${{ steps.version.outputs.version }}"
          gh release view $tag *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag `
              --target "${{ github.sha }}" `
              --title "TagStiller $tag" `
              --notes "Автоматическая Windows-сборка TagStiller $tag."
          }
          gh release upload $tag `
            "TagStiller-Windows-x64.zip" `
            "TagStiller-Windows-x64.zip.sha256" `
            --clobber
