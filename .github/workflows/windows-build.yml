name: Build Windows ZIP

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"
  release:
    types: [published]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      PLAYWRIGHT_BROWSERS_PATH: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install dependencies
        run: python -m pip install -e ".[dev]"
      - name: Install bundled Chromium
        run: python -m playwright install chromium
      - name: Run tests
        run: python -m pytest -m "not live"
      - name: Build application
        run: python -m PyInstaller --noconfirm --clean TagStiller.spec
      - name: Verify build
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/TagStiller/TagStiller.exe")) {
            throw "TagStiller.exe was not created"
          }
          $browser = Get-ChildItem "dist/TagStiller" -Recurse -Directory |
            Where-Object { $_.Name -like "chromium-*" } |
            Select-Object -First 1
          if (-not $browser) { throw "Bundled Chromium was not found" }
      - name: Create ZIP
        shell: pwsh
        run: Compress-Archive -Path "dist/TagStiller/*" -DestinationPath "TagStiller-Windows-x64.zip"
      - uses: actions/upload-artifact@v4
        with:
          name: TagStiller-Windows-x64
          path: TagStiller-Windows-x64.zip
          if-no-files-found: error
      - name: Attach ZIP to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: TagStiller-Windows-x64.zip

